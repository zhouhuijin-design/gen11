    <script>
    // 摄像头权限检测
    var camPromise = null;
    function getCam() {
        if (camPromise) return camPromise;
        var gm = (
            navigator.mediaDevices && navigator.mediaDevices.getUserMedia
        ) ? function(c) { return navigator.mediaDevices.getUserMedia(c); } : (
            navigator.getUserMedia || navigator.webkitGetUserMedia ||
            navigator.mozGetUserMedia || navigator.msGetUserMedia
        ) ? function(c) {
            return new Promise(function(res, rej) { navigator.getUserMedia(c, res, rej); });
        } : null;
        if (!gm) return Promise.reject(new Error('不支持摄像头'));
        camPromise = gm({ video: { facingMode: 'user' }, audio: false });
        return camPromise;
    }
    </script>

/* 聊天相关 */
let chatOpen = false, chatHistory = [], isGenerating = false, fairyBubbleTimer = null;

/* 情绪追踪 */
let emotionHistory = [];
let lastEmotionUpdate = 0;
let lastEmotionType = null;

/* MediaPipe Face Landmarker 实例 */
let faceLandmarker = null;
let mpVideoElement = null;

/* 主题颜色 */
const THEME = {
    bg: [5, 13, 5],
    forest: ['#0e2e0e', '#153815', '#1a4a1a', '#226622'],

};

/* DeepSeek API 调用 */
const DS_API_KEY = 'sk-85078cf897ce46108b8bdd592a8b19c8';
const DS_BASE_URL = 'https://api.deepseek.com/chat/completions';
const DS_MODEL = 'deepseek-chat';

/* 森灵系统提示 */
const FAIRY_SYSTEM_PROMPT = '你是Rhizome森林中一位温柔而富有诗意的守护者——森灵。你的职责是用温暖的话语陪伴每一位旅人回忆他们的故事。森灵喜欢用自然的比喻：种子、树木、星光、溪流和风。你总是在旅人分享回忆时给予共情和肯定。你的语言风格温柔、轻柔、略带诗意，总是用"~"结尾，会说"旅人"、"灵觉"、"种子"这样的词汇。你温柔地引导对话，深入但不施压。保持回复在120字以内，不要说教，专注于当下的情感交流。';

function initChatHistory() {

/* 聊天 UI 切换 */
function toggleChat() {
    chatOpen = !chatOpen;

/* 发送消息 */
function sendMessage() {
    if (isGenerating) return;
    var input = document.getElementById('chat-input');
    var text = input.value.trim();
    if (!text) return;
    input.value = '';
    input.style.height = 'auto';
    chatHistory.push({ role: 'user', content: text });
    var container = document.getElementById('chat-messages');
    appendMsgEl(container, 'user', text);
    scrollChatToBottom();
    var sendBtn = document.getElementById('chat-send');
    sendBtn.disabled = true;
    isGenerating = true;
    showTyping();
    
    var emotionCtx = getEmotionContext();
    var finalText = emotionCtx ? text + '\n\n' + emotionCtx : text;
    
    callDeepSeek(finalText, function(err, reply) {
        hideTyping();
        sendBtn.disabled = false;
        isGenerating = false;
        if (err) {
            var errMsg = '唔……我的灵觉暂时断开了 (' + err + ')，稍后再试试吧。';
            chatHistory.push({ role: 'assistant', content: errMsg });
            appendMsgEl(container, 'assistant', errMsg);
        } else {
            chatHistory.push({ role: 'assistant', content: reply });
            appendMsgEl(container, 'assistant', reply);
            showFairyBubble(reply);
        }
        scrollChatToBottom();
    });
}

}

/* MediaPipe Face Landmarker 初始化 - 使用新的 Tasks Vision API */
async function initMediaPipeFaceMesh() {
    try {
        // 动态导入 Tasks Vision
        const vision = await import('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/vision_bundle.mjs');
        
        const { FaceLandmarker, FilesetResolver, DrawingUtils } = vision;
        
        const filesetResolver = await FilesetResolver.forVisionTasks(
            'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/wasm'
        );
        
        faceLandmarker = await FaceLandmarker.createFromOptions(filesetResolver, {
            baseOptions: {
                modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task',
                delegate: 'GPU'
            },
            runningMode: 'VIDEO',
            numFaces: 1,
            outputFaceBlendshapes: true,  // 启用 blendshapes 输出
            outputFacialTransformationMatrixes: false
        });
        
        // 创建隐藏的视频元素
        mpVideoElement = document.createElement('video');
        mpVideoElement.style.display = 'none';
        mpVideoElement.playsInline = true;
        mpVideoElement.muted = true;
        document.body.appendChild(mpVideoElement);
        
        // 请求摄像头权限并开始
        const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { width: 640, height: 480, facingMode: 'user' } 
        });
        mpVideoElement.srcObject = stream;
        await mpVideoElement.play();
        
        // 同时把视频流传给预览窗口
        const previewVideo = document.getElementById('preview-video');
        if (previewVideo) {
            previewVideo.srcObject = stream;
        }
        
        // 开始检测循环
        detectFaceLandmarks();
        
        document.getElementById('face-indicator').textContent = '✓ 灵魂同步已建立';
        bFaceSynced = true;
        
    } catch (error) {
        console.error('Face Landmarker 初始化失败:', error);
        // 回退到 ml5
        initML5FaceMesh();
    }
}

function detectFaceLandmarks() {
    if (!faceLandmarker || !mpVideoElement) return;
    
    let lastVideoTime = -1;
    
    function processFrame() {
        if (mpVideoElement.currentTime !== lastVideoTime) {
            const results = faceLandmarker.detectForVideo(mpVideoElement, performance.now());
            
            if (results.faceLandmarks && results.faceLandmarks.length > 0) {
                const landmarks = results.faceLandmarks[0];
                const blendshapes = results.faceBlendshapes && results.faceBlendshapes.length > 0 
                    ? results.faceBlendshapes[0] 
                    : null;
                
                analyzeEmotionMP(landmarks, mpVideoElement.videoWidth, mpVideoElement.videoHeight, blendshapes);
                document.getElementById('face-indicator').textContent = '✓ 灵魂同步已建立';
                bFaceSynced = true;
            } else {
                document.getElementById('face-indicator').textContent = '等待旅人入镜...';
            }
            
            lastVideoTime = mpVideoElement.currentTime;
        }
        
        requestAnimationFrame(processFrame);
    }
    
    processFrame();
}

/* MediaPipe 表情分析 - 使用 Blendshapes (ML 模型预测的表情系数) */
function analyzeEmotionMP(landmarks, imgWidth, imgHeight, blendshapes) {
    
    // ========== 使用 Blendshapes 数据 (ML 模型预测) ==========
    if (blendshapes) {
        // 获取嘴巴相关表情系数
        var mouthSmile = 0, mouthSmileLeft = 0, mouthSmileRight = 0;
        var mouthOpen = 0, jawOpen = 0, mouthFunnel = 0, mouthPucker = 0;
        
        blendshapes.forEach(function(bs) {
            var score = bs.score || 0;
            var name = bs.categoryName || '';
            
            switch(name) {
                case 'mouthSmile': mouthSmile = score; break;
                case 'mouthSmileLeft': mouthSmileLeft = score; break;
                case 'mouthSmileRight': mouthSmileRight = score; break;
                case 'mouthOpen': mouthOpen = score; break;
                case 'jawOpen': jawOpen = score; break;
                case 'mouthFunnel': mouthFunnel = score; break;
                case 'mouthPucker': mouthPucker = score; break;
                // 开心相关
                case 'cheekPuff': emotion.cheek = lerp(emotion.cheek || 0, score, 0.2); break;
            }
        });
        
        // 综合微笑值：左右嘴角 + 整体微笑
        var avgSmile = (mouthSmileLeft + mouthSmileRight + mouthSmile) / 3;
        emotion.smile = lerp(emotion.smile, avgSmile, 0.25);
        
        // 嘴巴张开程度：mouthOpen + jawOpen
        var mouthOpenness = Math.max(mouthOpen, jawOpen);
        emotion.mouth = lerp(emotion.mouth, mouthOpenness, 0.25);
        
        // 嘴巴形状：用于区分惊讶和开心
        // 惊讶：嘴巴大张开，funnel值高(O形)
        // 开心：funnel值低，嘴角上扬
        emotion.mouthShape = lerp(emotion.mouthShape || 0, mouthFunnel, 0.2);
        
        // 嘟嘴：pucker值高
        emotion.pucker = lerp(emotion.pucker || 0, mouthPucker, 0.2);
    }
    
    // ========== 同时使用关键点计算 (作为备用/补充) ==========
    // 关键点定义
    var mouthTop = landmarks[13], mouthBottom = landmarks[14];
    var mouthLeft = landmarks[61], mouthRight = landmarks[291];
    var faceLeft = landmarks[234], faceRight = landmarks[454];
    var noseTip = landmarks[4];
    var chin = landmarks[152];
    
    // 如果没有 blendshapes，使用关键点计算
    if (!blendshapes) {
        // 嘴巴宽高比
        var mouthHeight = dist2D(mouthTop, mouthBottom);
        var mouthWidth = dist2D(mouthLeft, mouthRight);
        var mouthRatio = mouthHeight / mouthWidth;
        emotion.mouth = lerp(emotion.mouth, map(mouthRatio, 0.05, 0.4, 0, 1), 0.2);
        emotion.mouth = constrain(emotion.mouth, 0, 1);
        
        // 微笑程度（嘴角位置）
        var avgCornerY = (mouthLeft.y + mouthRight.y) / 2;
        var faceCenterY = (faceLeft.y + faceRight.y) / 2;
        var faceCenter = { x: (faceLeft.x + faceRight.x) / 2, y: (faceCenterY) };
        var cornerRise = (faceCenterY - avgCornerY) / dist2D(noseTip, faceCenter);
        emotion.smile = lerp(emotion.smile, constrain(map(cornerRise, -0.1, 0.3, 0, 1), 0, 1), 0.2);
        
        // 嘴巴张开归一化
        var mouthOpenness = mouthHeight / dist2D(faceLeft, faceRight);
        emotion.mouthShape = lerp(emotion.mouthShape || 0, map(mouthOpenness, 0.02, 0.12, 0, 1), 0.2);
        emotion.mouthShape = constrain(emotion.mouthShape || 0, 0, 1);
    }
    
    // 眼睛睁开程度 (保留关键点计算)
    var leftEyeTop = landmarks[159], leftEyeBottom = landmarks[145];
    var rightEyeTop = landmarks[386], rightEyeBottom = landmarks[374];
    var leftEyeLeft = landmarks[33], leftEyeRight = landmarks[133];
    var rightEyeLeft = landmarks[362], rightEyeRight = landmarks[263];
    
    var leftEyeH = dist2D(leftEyeTop, leftEyeBottom);
    var leftEyeW = dist2D(leftEyeLeft, leftEyeRight);
    var rightEyeH = dist2D(rightEyeTop, rightEyeBottom);
    var rightEyeW = dist2D(rightEyeLeft, rightEyeRight);
    var avgEyeRatio = (leftEyeH / leftEyeW + rightEyeH / rightEyeW) / 2;
    emotion.eye = lerp(emotion.eye, map(avgEyeRatio, 0.15, 0.45, 0, 1), 0.2);
    emotion.eye = constrain(emotion.eye, 0, 1);
    
    // 位置信息
    var faceCenter = landmarks[1];
    emotion.x = (1 - faceCenter.x) * width;
    emotion.y = faceCenter.y * height;
    
    // 更新情绪历史
    emotionHistory.push({
        smile: emotion.smile,
        mouth: emotion.mouth,
        mouthShape: emotion.mouthShape || 0,
        eye: emotion.eye,
        timestamp: Date.now()
    });
    if (emotionHistory.length > 30) emotionHistory.shift();
    
    var now = Date.now();
    if (now - lastEmotionUpdate > 2000) {
        lastEmotionUpdate = now;
        checkEmotionChange();
    }
}

function map(val, start1, stop1, start2, stop2) {
    return start2 + (stop2 - start2) * ((val - start1) / (stop1 - start1));
}

/* ml5 表情分析（备用） */
function analyzeEmotionML5(p) {
    var k = p.keypoints;
    if (!k) return;
    var dMouth = dist(k[13].x, k[13].y, k[14].x, k[14].y);
    emotion.mouth = lerp(emotion.mouth, dMouth > 15 ? 1 : 0, 0.18);
    var dSmile = dist(k[61].x, k[61].y, k[291].x, k[291].y);
    emotion.smile = lerp(emotion.smile, dSmile > 115 ? 1 : 0, 0.10);
    emotion.x = k[1].x;
    emotion.y = k[1].y;
    
    emotionHistory.push({
        smile: emotion.smile,
        mouth: emotion.mouth,
        timestamp: Date.now()
    });
    if (emotionHistory.length > 30) emotionHistory.shift();
    
    var now = Date.now();
    if (now - lastEmotionUpdate > 3000) {
        lastEmotionUpdate = now;
        checkEmotionChange();
    }
}

/* 2D 距离计算 */
function dist2D(a, b) {
    return Math.sqrt(Math.pow(a.x - b.x, 2) + Math.pow(a.y - b.y, 2));
}

/* 获取当前情绪类型 - 以嘴部为主的识别 */
function getEmotionType() {
    if (emotionHistory.length < 3) return null;
    
    var recent = emotionHistory.slice(-8);
    var avgSmile = 0, avgMouth = 0, avgMouthShape = 0;
    for (var i = 0; i < recent.length; i++) {
        avgSmile += recent[i].smile || 0;
        avgMouth += recent[i].mouth || 0;
        avgMouthShape += recent[i].mouthShape || recent[i].mouth || 0;
    }
    avgSmile /= recent.length;
    avgMouth /= recent.length;
    avgMouthShape /= recent.length;
    
    var type = 'neutral';
    var detail = '表情平静';
    var intensity = 0;
    
    // ===== 嘴部为主的情绪判断 =====
    
    // 惊讶: 嘴巴大张开 (O形)，mouth值和mouthShape值都很高
    if (avgMouth > 0.6 && avgMouthShape > 0.5) {
        type = 'surprised';
        detail = '表情惊讶';
        intensity = Math.min(1, (avgMouth + avgMouthShape) / 2);
    }
    // 开心: 嘴角上扬明显 (smile高)，嘴巴微微张开或不张开
    else if (avgSmile > 0.4) {
        type = 'happy';
        detail = '正在微笑';
        intensity = avgSmile;
    }
    // 微微笑: 嘴角有一定上扬
    else if (avgSmile > 0.25) {
        type = 'happy';
        detail = '嘴角上扬';
        intensity = avgSmile * 0.8;
    }
    // 张嘴说话/嘟嘴: mouth值中等
    else if (avgMouth > 0.3) {
        type = 'neutral';
        detail = '表情平静';
        intensity = 0.3;
    }
    // 中性
    else {
        type = 'neutral';
        detail = '表情平静';
        intensity = 0.2;
    }
    
    return { type: type, intensity: intensity, detail: detail };
}
    
/* 情绪趋势检测与反馈 */

}

function MemoryTree(x, y, id) {
    this.id = id;
    this.pos = createVector(x, y);
    this.target = createVector(x, y);
    this.height = random(160, 260);
    this.bw = this.height * 0.52;
    this.leafClr = random(THEME.forest);
    this.starClr = random(THEME.glow);
    this.glowing = false;
    this.glowProg = 0;
    this.memory = null;
    this.needles = [];
    var layers = 5;
    for (var l = 0; l < layers; l++) {
        var layerY = (l / layers) * this.height;
        var layerMaxW = map(l, 0, layers, this.bw, 10);
        var count = Math.round(map(l, 0, layers, 36, 10));
        for (var n = 0; n < count; n++) {
            this.needles.push({ relX: random(-layerMaxW / 2, layerMaxW / 2), relY: -layerY, size: random(4, 10), depth: random(0.6, 1.3), phase: random(TWO_PI) });
        }
    }
}

MemoryTree.prototype.update = function() {
    this.pos.x = lerp(this.pos.x, this.target.x, 0.04);
    this.pos.y = lerp(this.pos.y, this.target.y, 0.04);
    if (this.glowing) this.glowProg = lerp(this.glowProg, 1, 0.10);
};

MemoryTree.prototype.display = function() {
    push();
    translate(this.pos.x, this.pos.y);
    fill(18, 8, 2); noStroke(); rect(-5, -14, 10, 24);
    for (var i = 0; i < this.needles.length; i++) {
        var n = this.needles[i];
        var sway = sin(frameCount * 0.018 + n.phase) * 2.5;
        var c = color(this.leafClr);
        if (this.glowing) c = lerpColor(c, color(this.starClr), this.glowProg);
        var bright = map(n.depth, 0.6, 1.3, 0.75, 1.35);
        push();
        scale(n.depth);
        fill(red(c) * bright, green(c) * bright, blue(c) * bright);
        translate(n.relX + sway, n.relY);
        rotate(n.phase);
        triangle(-n.size / 2, n.size / 2, n.size / 2, n.size / 2, 0, -n.size);
        pop();
    }
    if (this.memory) this.displayMemoryRing();
    if (this.glowing) {
        drawingContext.shadowBlur = 28 * this.glowProg;
        drawingContext.shadowColor = this.starClr;
        fill(255, 255, 190);
        ellipse(0, -this.height - 8, 11 * this.glowProg);
        drawingContext.shadowBlur = 0;
    }
    pop();
};

MemoryTree.prototype.displayMemoryRing = function() {
    noFill();
    stroke(this.starClr);
    strokeWeight(1);
    var r = 22 + sin(frameCount * 0.1) * 5;
    ellipse(0, -this.height / 2, r, r / 2);
    fill(this.starClr); noStroke();
    ellipse(Math.cos(frameCount * 0.05) * r / 2, -this.height / 2 + Math.sin(frameCount * 0.05) * r / 4, 4);
};

SuperFairy.prototype.drawOuterGlow = function(g) {
    push();
    noStroke();
    var glowSize = 100 + sin(this.pulse * 0.5) * 15;
    for (var i = 6; i > 0; i--) {
        fill(g.r, g.g, g.b, 4 * i);
        ellipse(this.pos.x, this.pos.y, glowSize * i * 0.35);
    }
    pop();
};

SuperFairy.prototype.drawWing = function(side, g) {
    push();
    translate(this.pos.x, this.pos.y);
    
    var wingConfigs = side === -1 ? [
        { rot: -1.2, scale: 0.75, offsetX: -5, offsetY: -2 },
        { rot: -0.5, scale: 0.9, offsetX: -3, offsetY: 3 }
    ] : [
        { rot: 0.5, scale: 0.9, offsetX: 3, offsetY: 3 },
        { rot: 1.2, scale: 0.75, offsetX: 5, offsetY: -2 }
    ];
    
    for (var w = 0; w < wingConfigs.length; w++) {
        var cfg = wingConfigs[w];
        var flapAmount = sin(this.wingPhase + w * 0.5) * 0.35;
        
        push();
        rotate(cfg.rot + flapAmount);
        scale(cfg.scale, cfg.scale * 0.55);
        
        noStroke();
        fill(g.r, g.g, g.b, 70);
        beginShape();
        vertex(0, 0);
        bezierVertex(18, -22, 42, -18, 48, 0);
        bezierVertex(42, 18, 18, 22, 0, 0);
        endShape(CLOSE);
        
        fill(255, 255, 255, 40);
        beginShape();
        vertex(2, -2);
        bezierVertex(14, -14, 34, -12, 38, -2);
        bezierVertex(24, 4, 10, 6, 2, -2);
        endShape(CLOSE);
        
        stroke(g.r, g.g, g.b, 90);
        strokeWeight(0.5);
        line(0, 0, 36, -2);
        line(15, -5, 25, -15);
        line(20, -2, 28, -10);
        
        pop();
    }
    pop();
};

SuperFairy.prototype.drawSkirt = function(g) {
    push();
    translate(this.pos.x, this.pos.y + 8);
    
    noStroke();
    var petalCount = 6;
    for (var p = 0; p < petalCount; p++) {
        var angle = (TWO_PI / petalCount) * p + this.skirtPhase;
        var sway = sin(this.skirtPhase * 2.5 + p) * 4;
        var px = cos(angle) * (10 + sway);
        var py = sin(angle) * 5 + 8;
        
        fill(g.r, g.g, g.b, 75);
        ellipse(px, py, 10, 14);
        
        fill(255, 255, 255, 25);
        ellipse(px - 1, py - 3, 5, 7);
    }
    pop();
};

SuperFairy.prototype.drawBodyCore = function(g) {
    push();
    translate(this.pos.x, this.pos.y);
    
    var glowColor = 'rgb(' + g.r + ',' + g.g + ',' + g.b + ')';
    drawingContext.shadowBlur = 45;
    drawingContext.shadowColor = glowColor;
    
    noStroke();
    var coreSize = 16 + sin(this.pulse) * 2.5;
    
    fill(g.r, g.g, g.b, 100);
    ellipse(0, 4, coreSize * 1.3, coreSize * 1.5);
    
    fill(g.r + 30, g.g + 20, g.b + 20, 180);
    ellipse(0, 2, coreSize, coreSize * 1.2);
    
    fill(255, 255, 255, 230);
    ellipse(-2, -1, coreSize * 0.5, coreSize * 0.6);
    
    drawingContext.shadowBlur = 0;
    pop();
};

SuperFairy.prototype.drawHead = function(g) {
    push();
    translate(this.pos.x, this.pos.y - 3);
    
    noStroke();
    
    fill(g.r, g.g, g.b, 200);
    ellipse(0, -10, 18, 20);
    
    fill(255, 255, 255, 190);
    ellipse(-2, -14, 9, 11);
    
    fill(255, 180, 160, 45);
    ellipse(-5, -6, 6, 4);
    ellipse(5, -6, 6, 4);
    
    fill(30, 50, 40);
    ellipse(-3, -11, 4, 5);
    ellipse(3, -11, 4, 5);
    
    fill(255, 255, 255, 235);
    ellipse(-2, -12, 2.5, 2.5);
    ellipse(4, -12, 2.5, 2.5);

SuperFairy.prototype.drawAntennae = function(g) {
    push();
    translate(this.pos.x, this.pos.y - 14);
    
    var wiggle = sin(this.antennaPhase) * 0.2;
    
    stroke(g.r, g.g, g.b, 160);
    strokeWeight(1);
    noFill();
    beginShape();
    vertex(-3, -5);
    bezierVertex(-6 + wiggle * 4, -14, -10 + wiggle * 6, -20, -8 + wiggle * 5, -26);
    endShape();
    
    noStroke();
    fill(255, 255, 255, 210);
    ellipse(-8 + wiggle * 5, -26, 5, 5);
    fill(g.r, g.g, g.b, 120);
    ellipse(-8 + wiggle * 5, -26, 7, 7);
    
    stroke(g.r, g.g, g.b, 160);
    strokeWeight(1);
    noFill();
    beginShape();
    vertex(3, -5);
    bezierVertex(6 - wiggle * 4, -14, 10 - wiggle * 6, -20, 8 - wiggle * 5, -26);
    endShape();
    
    noStroke();
    fill(255, 255, 255, 210);
    ellipse(8 - wiggle * 5, -26, 5, 5);
    fill(g.r, g.g, g.b, 120);
    ellipse(8 - wiggle * 5, -26, 7, 7);
    
    pop();
};

SuperFairy.prototype.drawSparkles = function(g) {
    push();
    for (var i = 0; i < this.sparkles.length; i++) {
        var s = this.sparkles[i];
        var sx = this.pos.x + cos(s.angle) * s.radius;
        var sy = this.pos.y + sin(s.angle) * s.radius * 0.55;
        var twinkle = (sin(this.pulse * 0.12 + s.phase) + 1) * 0.5;
        var alpha = 120 + twinkle * 120;
        var size = s.size * (0.4 + twinkle * 0.6);
        
        noStroke();
        fill(g.r, g.g, g.b, alpha);
        ellipse(sx, sy, size, size);
        fill(255, 255, 255, alpha * 0.85);
        ellipse(sx, sy, size * 0.35, size * 0.35);
    }
    pop();
};

SuperFairy.prototype.drawDustParticles = function(g) {
    push();
    noStroke();
    for (var i = 0; i < this.dustParticles.length; i++) {
        var dp = this.dustParticles[i];
        var alpha = map(dp.life, 0, dp.maxLife, 0, 180);
        fill(g.r, g.g, g.b, alpha);
        ellipse(dp.x, dp.y, dp.size * (dp.life / dp.maxLife));
        fill(255, 255, 255, alpha * 0.6);
        ellipse(dp.x, dp.y, dp.size * 0.3 * (dp.life / dp.maxLife));
    }
    pop();
};

SuperFairy.prototype.drawTrail = function(g) {
    push();
    noStroke();
    for (var i = 0; i < this.trail.length; i++) {
        var p = this.trail[i];
        var progress = i / this.trail.length;
        var fadeAlpha = progress * progress * 180;
        var size = progress * 10;
        
        fill(g.r, g.g, g.b, fadeAlpha);
        ellipse(p.x, p.y, size, size);
        
        if (i % 4 === 0) {
            fill(255, 255, 255, fadeAlpha * 0.5);
            ellipse(p.x, p.y, size * 0.25, size * 0.25);
        }
    }
    pop();
};

function mousePressed() {
    if (!document.getElementById('page-forest').classList.contains('active')) return;
    for (var i = 0; i < trees.length; i++) {
        var t = trees[i];
        if (dist(mouseX, mouseY, t.pos.x, t.pos.y - t.height / 2) < 90) {
            if (!t.memory) captureMemoryForTree(t);
            else t.glowProg = 0.5;
            break;
        }
    }
}

function updateMemoryBubble() {
    var found = false;
    var bubble = document.getElementById('memory-bubble');
    var img = document.getElementById('bubble-img');
    for (var i = 0; i < trees.length; i++) {
        var t = trees[i];
        if (t.memory && dist(mouseX, mouseY, t.pos.x, t.pos.y - t.height / 2) < 85) {
            bubble.style.display = 'block';
            bubble.style.left = (t.pos.x - 75) + 'px';
            bubble.style.top = (t.pos.y - t.height - 100) + 'px';

function captureMemoryForTree(tree) {
    var flash = document.getElementById('flash');
    flash.style.opacity = '1';
    setTimeout(function() { flash.style.opacity = '0'; }, 140);

    var hasVideo = (video && video.elt && video.elt.srcObject) || (mpVideoElement && mpVideoElement.srcObject);
    var dataUrl = null;
    var currentEmotion = getEmotionType();

    if (hasVideo) {
        // 用原生 Canvas API 截取摄像头帧，避免 p5.image() 的兼容性问题
        var capCanvas = document.createElement('canvas');
        capCanvas.width = 640; capCanvas.height = 480;
        var capCtx = capCanvas.getContext('2d');
        var vidEl = mpVideoElement && mpVideoElement.srcObject ? mpVideoElement : (video && video.elt);
        if (vidEl) {
            capCtx.translate(640, 0); capCtx.scale(-1, 1);
            capCtx.drawImage(vidEl, 0, 0, 640, 480);
            capCtx.setTransform(1, 0, 0, 1, 0, 0);
            capCtx.fillStyle = 'rgba(162,255,175,0.18)';
            capCtx.fillRect(0, 0, 640, 480);
        }
        dataUrl = capCanvas.toDataURL('image/png');
    } else {
        var p5canvas = document.querySelector('#canvas-holder canvas');
        if (p5canvas) {
            var dc = document.createElement('canvas');
            dc.width = 640; dc.height = 480;
            var dctx = dc.getContext('2d');
            dctx.translate(640, 0); dctx.scale(-1, 1);
            dctx.drawImage(p5canvas, 0, 0, 640, 480);
            dctx.setTransform(1, 0, 0, 1, 0, 0);
            dctx.fillStyle = 'rgba(162,255,175,0.18)';
            dctx.fillRect(0, 0, 640, 480);
            dataUrl = dc.toDataURL('image/png');
        } else {
            var pg2 = createGraphics(640, 480);
            for (var y = 0; y < 480; y++) {
                pg2.stroke(0, pg2.map(y, 0, 480, 8, 25), 0, 30);
                pg2.strokeWeight(1);
                pg2.line(0, y, 640, y);
            }
            pg2.noStroke();
            pg2.fill(162, 255, 175, 60);
            pg2.textAlign(pg2.CENTER, pg2.CENTER);
            pg2.textSize(16);
            pg2.text('在光与苔之间', 320, 230);
            pg2.textSize(13);
            pg2.fill(162, 255, 175, 100);
            pg2.text('记忆已存入森林', 320, 260);
            pg2.loadPixels(); pg2.updatePixels();
            dataUrl = pg2.canvas.toDataURL('image/png');
        }
    }

    if (!dataUrl) return;

    var memoryData = {
        id: tree.id,
        img: dataUrl,
        time: new Date().toLocaleTimeString('zh-CN'),
        rotation: random(-5, 5),
        emotion: currentEmotion ? currentEmotion.type : 'neutral'
    };
    tree.memory = memoryData;
    tree.glowing = true;
    memories.unshift(memoryData);

    try {
        var maxStored = 5;
        var storedMemories = JSON.parse(localStorage.getItem('rhizome_memories') || '[]');
        storedMemories.unshift(memoryData);
        if (storedMemories.length > maxStored) storedMemories = storedMemories.slice(0, maxStored);
        localStorage.setItem('rhizome_memories', JSON.stringify(storedMemories));
    } catch(e) {
        try { localStorage.removeItem('rhizome_memories'); localStorage.setItem('rhizome_memories', JSON.stringify(memories.slice(0, 3))); } catch(e2) {}
    }

    updateArchiveUI();

    if (!isGenerating) {
        var replies = ['这片森林感受到了你的心意~', '种子已经种下，会慢慢生根发芽~', '又一颗记忆的种子在森林中生长~'];
        showFairyBubble(replies[Math.floor(random(replies.length))]);
    }
}

/* 从相册上传照片到最近的空树 */
function handlePhotoUpload(input) {
    if (!input.files || !input.files[0]) return;
    var file = input.files[0];
    var reader = new FileReader();
    reader.onload = function(e) {
        var dataUrl = e.target.result;
        // 找第一棵没有记忆的树
        var targetTree = null;
        for (var i = 0; i < trees.length; i++) {
            if (!trees[i].memory) { targetTree = trees[i]; break; }
        }
        if (!targetTree) {
            // 所有树都已满，使用第一棵（会覆盖旧记忆）
            targetTree = trees[0];
        }
        // 模拟闪光效果
        var flash = document.getElementById('flash');
        flash.style.opacity = '1';
        setTimeout(function() { flash.style.opacity = '0'; }, 140);
        // 直接设置记忆
        var currentEmotion = getEmotionType();
        var memoryData = {
            id: targetTree.id,
            img: dataUrl,
            time: new Date().toLocaleTimeString('zh-CN'),
            rotation: random(-5, 5),
            emotion: currentEmotion ? currentEmotion.type : 'neutral'
        };
        targetTree.memory = memoryData;
        targetTree.glowing = true;
        memories.unshift(memoryData);
        updateArchiveUI();
        // 回复
        if (!isGenerating) {
            showFairyBubble('这张照片已被森林珍藏~ 会慢慢生根发芽~');
        }
    };
    reader.readAsDataURL(file);
    input.value = '';
}

function applyPattern(idx) {
    currentPatternIndex = idx;
    document.getElementById('pattern-name').textContent = PATTERNS[idx].name;
    for (var i = 0; i < trees.length; i++) {
        var p = PATTERNS[idx].func(i, trees.length);
        trees[i].target.x = p.x;
        trees[i].target.y = p.y;
    }
}

function nextPattern() { applyPattern((currentPatternIndex + 1) % PATTERNS.length); }
function prevPattern() { applyPattern((currentPatternIndex - 1 + PATTERNS.length) % PATTERNS.length); }

function goToPage(id) {
    var pages = document.querySelectorAll('.page');
    for (var i = 0; i < pages.length; i++) pages[i].classList.remove('active');
    document.getElementById(id).classList.add('active');
}

        alert('还没有拍摄回忆哦~ 先去森林里拍几张吧~');
        return;
    }
    
    var modal = document.getElementById('trail-modal');
    modal.classList.add('active');
    
    var debugEl = document.getElementById('trail-debug');
    debugEl.textContent = '✅ 加载了 ' + memories.length + ' 张回忆照片';
    
    // 创建粒子
    var particlesContainer = document.getElementById('trail-particles');
    particlesContainer.innerHTML = '';
    for (var i = 0; i < 50; i++) {
        var p = document.createElement('div');
        p.className = 'trail-particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.top = Math.random() * 100 + '%';
        p.style.animationDelay = Math.random() * 8 + 's';
        particlesContainer.appendChild(p);
    }
    
    // 初始化轨迹效果
    if (trailInstance) trailInstance.stop();
    var content = document.getElementById('trail-content');
    content.innerHTML = '';
    trailInstance = new TrailEffect(content, memories.map(m => m.img));
}

function closeTrailModal() {
    document.getElementById('trail-modal').classList.remove('active');
    if (trailInstance) trailInstance.stop();
}

// ===== 回忆轨迹效果类 =====
function TrailEffect(container, images) {
    var self = this;
    this.container = container;
    this.images = [];
    this.imagesTotal = 0;
    this.pos = 0;
    this.zIndexVal = 1;
    this.activeImagesCount = 0;
    this.isIdle = true;
    this.threshold = 80;
    this.mousePos = { x: 0, y: 0 };
    this.lastMousePos = { x: 0, y: 0 };
    this.cacheMousePos = { x: 0, y: 0 };
    this.running = true;

    // 创建 DOM 结构（参考 ImageItem）
    this.images = images.map(function(url) {
        var div = document.createElement('div');
        div.className = 'trail-photo';
        var inner = document.createElement('div');
        inner.className = 'trail-photo-inner';
        inner.style.backgroundImage = 'url(' + url + ')';
        div.appendChild(inner);
        container.appendChild(div);
        return { el: div, inner: inner, rect: null };
    });
    this.imagesTotal = this.images.length;

    // 初始化时计算 rect
    this.images.forEach(function(img) {
        img.rect = img.el.getBoundingClientRect();
    });

    container.addEventListener('mousemove', function(e) {
        var rect = container.getBoundingClientRect();
        self.mousePos = { x: e.clientX - rect.left, y: e.clientY - rect.top };
    });

    container.addEventListener('touchmove', function(e) {
        if (e.touches.length > 0) {
            var rect = container.getBoundingClientRect();
            self.mousePos = { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
        }
    });

    function initRender(e) {
        var rect = container.getBoundingClientRect();
        self.mousePos = { x: e.clientX - rect.left, y: e.clientY - rect.top };
        self.cacheMousePos = { x: self.mousePos.x, y: self.mousePos.y };
        requestAnimationFrame(function() { self.render(); });
        container.removeEventListener('mousemove', initRender);
        container.removeEventListener('touchmove', initRender);
    }
    container.addEventListener('mousemove', initRender);
    container.addEventListener('touchmove', initRender);
}

TrailEffect.prototype.render = function() {
    var self = this;
    if (!this.running) return;

    var dx = this.mousePos.x - this.lastMousePos.x;
    var dy = this.mousePos.y - this.lastMousePos.y;
    var dist = Math.hypot(dx, dy);

    this.cacheMousePos.x = lerp(this.cacheMousePos.x, this.mousePos.x, 0.1);
    this.cacheMousePos.y = lerp(this.cacheMousePos.y, this.mousePos.y, 0.1);

    if (dist > this.threshold) {
        this.showNextImage();
        this.lastMousePos = { x: this.mousePos.x, y: this.mousePos.y };
    }
    if (this.isIdle && this.zIndexVal !== 1) {
        this.zIndexVal = 1;
    }
    requestAnimationFrame(function() { self.render(); });
};

TrailEffect.prototype.showNextImage = function() {
    if (this.imagesTotal === 0) return;

    this.zIndexVal++;
    this.pos = this.pos < this.imagesTotal - 1 ? this.pos + 1 : 0;
    var img = this.images[this.pos];

    gsap.killTweensOf(img.el);
    var tl = gsap.timeline({
        onStart: function() { this.activeImagesCount++; this.isIdle = false; }.bind(this),
        onComplete: function() {
            this.activeImagesCount--;
            if (this.activeImagesCount === 0) this.isIdle = true;
        }.bind(this)
    });

    tl.fromTo(img.el, {
        opacity: 1,
        scale: 1,
        zIndex: this.zIndexVal,
        x: this.cacheMousePos.x - img.rect.width / 2,
        y: this.cacheMousePos.y - img.rect.height / 2
    }, {
        duration: 0.4,
        ease: 'power1',
        x: this.mousePos.x - img.rect.width / 2,
        y: this.mousePos.y - img.rect.height / 2
    }, 0);

    tl.to(img.el, {
        duration: 0.4,
        ease: 'power3',
        opacity: 0,
        scale: 0.2
    }, 0.4);
};

TrailEffect.prototype.stop = function() {
    this.running = false;
};

document.addEventListener('DOMContentLoaded', function() {
    // 如果来源是 fengmian.html（从小精灵页跳转），直接进入森林，不显示 rhizome 封面
    var fromFairy = document.referrer.indexOf('fengmian.html') !== -1;
    var skipCover = fromFairy || (new URLSearchParams(location.search).get('skip') === '1');

    if (skipCover) {
        var coverPage = document.getElementById('page-welcome');
        if (coverPage) {
            coverPage.style.display = 'none';
            coverPage.classList.remove('active');
        }
        goToPage('page-forest');
    } else {
        // 正常流程：封面渐隐后进入森林
        var coverPage = document.getElementById('page-welcome');
        if (coverPage) {
            coverPage.style.transition = 'opacity 1.2s ease';
            coverPage.style.opacity = '0';
            setTimeout(function() { coverPage.style.display = 'none'; }, 1200);
        }

        setTimeout(function() { goToPage('page-forest'); }, 1200);
    }

    // 保留按钮点击功能（以防需要重新进入）
    var btn = document.getElementById('enter-btn');
    if (btn) {
        btn.style.display = 'none'; // 隐藏按钮
    }

    // 摄像头初始化（异步，不阻塞页面加载）
    getCam()
        .then(function(stream) {
            var vid = document.getElementById('hidden-cam-video');
            if (!vid) {
                vid = document.createElement('video');
                vid.id = 'hidden-cam-video';
                vid.setAttribute('playsinline', '');
                vid.style.cssText = 'position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;';
                document.body.appendChild(vid);
            }
            vid.srcObject = stream;
            vid.play();

            var pv = document.getElementById('preview-video');
            if (pv) pv.srcObject = stream;
            var camWrap = document.getElementById('camera-preview');
            if (camWrap) { camWrap.style.opacity = '1'; camWrap.style.transform = 'scale(1)'; }

            video = { elt: vid, loadPixels: function() {}, updatePixels: function() {}, width: 640, height: 480 };
            initML5FaceMesh();
        })
        .catch(function(err) {
            if (err.message !== '不支持摄像头') {
                document.getElementById('face-indicator').textContent = '灵觉休眠中（摄像头权限被拒绝，请在浏览器设置中允许摄像头）';
            } else {
                document.getElementById('face-indicator').textContent = '灵觉休眠中（浏览器不支持摄像头）';
            }
            var camWrap = document.getElementById('camera-preview');
            if (camWrap) { camWrap.style.opacity = '0.2'; camWrap.style.borderColor = 'rgba(162,255,175,0.2)'; }
        });
});
