<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>根茎森林 | Rhizome Forest</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #050d09;
    overflow: hidden;
    height: 100dvh;
    width: 100dvw;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Noto Serif SC", serif;
    color: #e8f4ea;
  }
  video {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }
  .hint-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 80px;
    background: linear-gradient(transparent, rgba(5, 14, 6, 0.9));
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 10;
  }
  .hint-text {
    font-size: 0.78rem;
    letter-spacing: 0.2em;
    color: rgba(162, 255, 175, 0.55);
    text-shadow: 0 0 12px rgba(162, 255, 175, 0.3);
    animation: hintPulse 2.5s ease-in-out infinite;
  }
  @keyframes hintPulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }
  #progress-bar {
    position: fixed;
    bottom: 0; left: 0;
    height: 3px;
    background: rgba(162, 255, 175, 0.5);
    width: 0%;
    z-index: 15;
    transition: width 0.1s linear;
  }
  #skip-btn {
    position: fixed;
    bottom: 30px; right: 30px;
    padding: 8px 20px;
    border-radius: 20px;
    border: 1px solid rgba(162, 255, 175, 0.35);
    background: rgba(10, 30, 18, 0.6);
    color: rgba(200, 255, 210, 0.8);
    font-family: "Noto Serif SC", serif;
    font-size: 0.78rem;
    letter-spacing: 0.15em;
    cursor: pointer;
    backdrop-filter: blur(8px);
    z-index: 20;
    transition: background 0.2s, border-color 0.2s;
  }
  #skip-btn:hover {
    background: rgba(20, 60, 30, 0.7);
    border-color: rgba(162, 255, 175, 0.6);
  }
</style>
</head>
<body>
  <video id="main-video" playsinline>
    <source src="./视频.mp4" type="video/mp4">
  </video>
  <div class="hint-bar">
    <p class="hint-text">视频即将播放 · 播放结束后将自动进入森林</p>
  </div>
  <div id="progress-bar"></div>
  <button id="skip-btn">跳过 &#8594;</button>

  <script>
    var video    = document.getElementById('main-video');
    var progress = document.getElementById('progress-bar');
    var skipBtn  = document.getElementById('skip-btn');

    function goNext() {
      window.location.href = './fengmian.html';
    }

    video.addEventListener('loadedmetadata', function() {
      video.play().catch(function() {});
    });

    video.addEventListener('timeupdate', function() {
      if (video.duration) {
        progress.style.width = ((video.currentTime / video.duration) * 100) + '%';
      }
    });

    video.addEventListener('ended', goNext);
    video.addEventListener('error', goNext);
    skipBtn.addEventListener('click', goNext);
  </script>
</body>
</html>
